apiVersion: skaffold/v4beta6
kind: Config

build:
  local:
    push: false
  artifacts:
    - image: eureka
      context: ../cd_eureka
    - image: auth-service
      context: ../cd_auth
    - image: generator-service
      context: ../cd_generator
    - image: mock-service
      context: ../cd_mock
    - image: desc-service
      context: ../cd_desc
    - image: site-service
      context: ../cd_site
    - image: notification-service
      context: ../cd_notification

manifests:
  rawYaml:
    - k8s/db/*.yaml
    - k8s/apps/*.yaml

deploy:
  kubectl: {}