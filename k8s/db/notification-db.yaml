apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-notification
  template:
    metadata:
      labels:
        app: db-notification
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: cd_notification
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: db-notification
spec:
  selector:
    app: db-notification
  ports:
    - port: 5432
      targetPort: 5432