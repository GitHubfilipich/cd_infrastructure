apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-mock
  template:
    metadata:
      labels:
        app: db-mock
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: cd_mock
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: password
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: db-mock
spec:
  type: NodePort
  selector:
    app: db-mock
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30035