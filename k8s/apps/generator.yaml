apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: generator-service
  template:
    metadata:
      labels:
        app: generator-service
    spec:
      containers:
        - name: generator-service
          image: generator-service
          ports:
            - containerPort: 9903
          env:
            # DB
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://db-generator:5432/cd_generator
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            # Eureka
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: EUREKA_URL
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"

            # Auth
            - name: SECURITY_OAUTH2_RESOURCE_USERINFOURI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AUTH_URL
---
apiVersion: v1
kind: Service
metadata:
  name: generator-service
spec:
  selector:
    app: generator-service
  ports:
    - port: 9903
      targetPort: 9903