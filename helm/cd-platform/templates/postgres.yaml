{{- range .Values.databases }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-{{ .name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-{{ .name }}
  template:
    metadata:
      labels:
        app: db-{{ .name }}
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: {{ .db }}
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: password
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: db-{{ .name }}
spec:
  selector:
    app: db-{{ .name }}
  ports:
    - port: 5432
      targetPort: 5432
---
{{- end }}